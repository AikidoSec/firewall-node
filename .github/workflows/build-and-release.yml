name: 🚀 Build and release
on:
  release:
    types: [created]
jobs:
  build-artifacts:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
  run-unit-tests:
    needs: build-artifacts
    uses: ./.github/workflows/unit-test.yml
    permissions:
      contents: read
      id-token: write
  run-end-to-end-tests:
    needs: build-artifacts
    uses: ./.github/workflows/end-to-end-tests.yml
    permissions:
      contents: read
  run-benchmarks:
    needs: build-artifacts
    uses: ./.github/workflows/benchmark.yml
    permissions:
      contents: read
  build:
    needs:
      - run-unit-tests
      - run-end-to-end-tests
      - run-benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
          scope: "@aikidosec"
          package-manager-cache: false

      - name: Set up Rust
        run: |
          rustup toolchain install stable
          rustup default stable
          cargo install wasm-pack
      - name: Setup Aikido safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci
      - name: Downgrade npm
        # https://github.com/npm/cli/issues/8669
        run: npm i -g npm@11.6.0
      - name: Install dependencies
        run: npm run install-lib-only
      - name: Get the version
        id: get_version
        run: echo "tag=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT
      - name: Set the version
        run: cd library && npm --no-git-tag-version version ${GIT_TAG}
        env:
          GIT_TAG: ${{ steps.get_version.outputs.tag }}
      - name: Build the library
        run: npm run build
      - name: Linting
        run: npm run lint
      - name: Upgrade npm for staged publishing
        # npm stage publish requires npm 11.15.0+
        run: npm i -g npm@11.15.0
      - name: Publish to NPM
        run: |
          if [ "${{ github.event.release.prerelease }}" = "true" ]; then
            echo "Publishing beta version ${GIT_TAG} to NPM"
            cd build && npm stage publish --provenance --access public --tag beta
          else
            echo "Publishing version ${GIT_TAG} to NPM"
            cd build && npm stage publish --provenance --access public
          fi
        env:
          GIT_TAG: ${{ steps.get_version.outputs.tag }}
