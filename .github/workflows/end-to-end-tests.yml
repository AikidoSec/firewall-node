name: 🕵️ End to end tests

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - node-version: 20.x
            mode: "old"
          - node-version: 22.x
            mode: "old"
          - node-version: 24.x
            mode: "old"
          - node-version: 24.x
            mode: "new"
          - node-version: 25.x
            mode: "new"
          - node-version: 26.x
            mode: "new"

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"
          check-latest: true

      - name: Setup Aikido safe-chain
        run: curl -fsSL https://github.com/AikidoSec/safe-chain/releases/latest/download/install-safe-chain.sh | sh -s -- --ci

      - name: Downgrade npm for v24 and v25
        # https://github.com/npm/cli/issues/8669
        if: ${{ matrix.node-version == '24.x' || matrix.node-version == '25.x' || matrix.node-version == '26.x' }}
        run: npm i -g npm@11.6.0

      - name: Add local.aikido.io to /etc/hosts
        run: |
          sudo echo "127.0.0.1 local.aikido.io" | sudo tee -a /etc/hosts

      - name: Run Containers
        run: npm run containers

      - name: Install dependencies (end-to-end only)
        run: npm run install-e2e-only

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: firewall-node-library-${{ github.sha }}

      - name: Run end-to-end tests
        if: matrix.mode == 'old'
        run: npm run end2end

      - name: Run new end-to-end tests
        if: matrix.mode == 'new'
        run: npm run end2end:new
